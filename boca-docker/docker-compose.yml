      - BOCA_JAIL_HOST=localhost
      - TMP=/tmp
      - TMPDIR=/tmp
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - boca-db
    ports:
      - 127.0.0.1:3001:3000
    environment:
      - GF_SECURITY_ADMIN_USER=CCASuperOverview
      - GF_SECURITY_ADMIN_PASSWORD=Ur#t4i@CCAIFG0!2026xZq3
      - GF_USERS_ALLOW_SIGN_UP=false
